<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changing Content with JavaScript</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 18px;
            padding: 40px;
            background-color: #f0f0f0;
        }

        .box {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="greeting" class="box">Hello!</div>
    <div id="counter" class="box">Count: 0</div>
    <div id="bio" class="box">My name is <strong>Hanjun</strong> and I study <em>Communication Design</em>.</div>

    <script src="script.js"></script>

</body>

</html>
