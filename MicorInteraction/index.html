<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose a Mood</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <main class="page">
    <p class="eyebrow"></p>
    <h1>choose a mood.</h1>
    <p class="intro">how should this interface respond?</p>

    <input type="radio" name="mood" id="reset" checked />
    <input type="radio" name="mood" id="calm" />
    <input type="radio" name="mood" id="sad" />
    <input type="radio" name="mood" id="happy" />

    <section class="stage">
      <div class="emoji-box">
        <div class="emoji default-emoji">😐</div>
        <div class="emoji calm-emoji">😌</div>
        <div class="emoji sad-emoji">😭</div>
        <div class="emoji happy-emoji">😁</div>
      </div>

      <div class="message-box">
        <p class="message default-message">
          choose one emotion to change the interface response.
        </p>
        <p class="message calm-message">
          everything is okay. breathe slowly.
        </p>
        <p class="message sad-message">
          it is okay to feel heavy sometimes.
        </p>
        <p class="message happy-message">
          this mood is bright and full of energy.
        </p>
      </div>

      <div class="buttons">
        <label for="calm" class="mood-btn">calm</label>
        <label for="sad" class="mood-btn">sad</label>
        <label for="happy" class="mood-btn">happy</label>
        <label for="reset" class="mood-btn reset-btn">reset</label>
      </div>
    </section>
  </main>
</body>
</html>
