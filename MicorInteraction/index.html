<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose a Mood</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <main class="page mood-default" id="page">
    <p class="eyebrow">UNIT 2 PROJECT</p>

    <h1>choose a mood.</h1>

    <p class="intro">
      how should this interface respond?
    </p>

    <div class="stage">
      <div class="orb-wrap">
        <div class="orb" id="orb"></div>
      </div>

      <p class="message" id="message">
        press a button to change the feeling of the interface.
      </p>

      <div class="buttons">
        <button class="mood-btn" id="calmBtn">calm</button>
        <button class="mood-btn" id="alertBtn">alert</button>
        <button class="mood-btn" id="softBtn">soft</button>
        <button class="mood-btn reset-btn" id="resetBtn">reset</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
