<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curiosity Cabinet Bingo</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">UNIT 2 PROJECT</p>
      <h1>Curiosity Cabinet</h1>
      <p class="intro">
        open treasure drawers, uncover everyday clues, and complete a bingo row to reveal a hidden mood.
      </p>
    </header>

    <section class="status-bar">
      <div class="status-card">
        <span class="status-label">board status</span>
        <span class="status-value"><span id="unlockedCount">0</span>/5 moods found</span>
      </div>
      <div class="status-card">
        <span class="status-label">mission</span>
        <span class="status-value">complete one full row</span>
      </div>
      <div class="status-card">
        <span class="status-label">mode</span>
        <span class="status-value">retro cabinet bingo</span>
      </div>
    </section>

    <section class="board-shell">
      <div class="board-grid" id="boardGrid"></div>
    </section>
  </main>

  <section class="emotion-overlay" id="emotionOverlay" aria-hidden="true">
    <div class="overlay-card" id="overlayCard">
      <button class="close-overlay" id="closeOverlay" aria-label="Close reveal">×</button>
      <div class="overlay-burst"></div>
      <div class="overlay-emoji" id="overlayEmoji">😌</div>
      <p class="overlay-name" id="overlayName">calm</p>
      <p class="overlay-message" id="overlayMessage">quiet things can still hold meaning</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
